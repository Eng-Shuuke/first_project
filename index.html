<!doctype html>
<html lang="so">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mareegtaada</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 1. Header-ka Sare (Gees-ka-Gees) -->
    <header class="full-header">
      <div class="container header-flex">
        <div class="logo">
          <img src="logo.png" alt="Logo" class="logo-img" />
          <!-- Ama qoraal UNR ah -->
        </div>

        <div class="search-bar">
          <input type="text" placeholder="Search Here..." />
        </div>

        <nav class="nav-links">
          <a href="#">Home</a>
          <a href="#">About</a>
          <a href="#">Contact us</a>
          <a href="#">Portfolio</a>
        </nav>
      </div>
    </header>

    <!-- 2. Hero Section (Midabka cagaarka ah ee gees-ka-geeska ah) -->
    <section class="hero-section">
      <div class="container hero-flex">
        <!-- Qaybta Bidix (Qoraalka iyo Badhamada) -->
        <div class="hero-content">
          <p class="hero-text">
            Lorem ipsum dolor sit amet, consectetur adipisicing elit. Mollitia
            ipsa soluta, quam debitis rerum doloribus reprehenderit possimus
            delectus illum excepturi magnam omnis?
          </p>
          <h1 class="hero-title">Nuur</h1>
          <div class="hero-buttons">
            <button class="btn btn-primary">Badhan 1</button>
            <button class="btn btn-secondary">Badhan 2</button>
          </div>
        </div>

        <!-- Qaybta Midig (Sawirka X-ta leh) -->
        <div class="hero-image-box">
          <!-- Halkan sawirkaaga soo geli, hadda waa sanduuq banaan oo X leh -->
          <div class="placeholder-image">
            <span class="x-mark">✕</span>
          </div>
        </div>
      </div>
    </section>

    <!-- serveces -->
    <div class="servece-section">
      <div class="container header-flex">
        <div class="img-box-1"><img src="img_1.jpg" alt="" /></div>
        <div class="img-box-1"><img src="img_2.png" alt="" /></div>
        <div class="img-box-1"><img src="img_1.jpg" alt="" /></div>
      </div>
    </div>
  </body>
</html>
